name: Data Pipeline

on:
  schedule:
    # Source cadence: ANNUAL. The Department of Education publishes the student
    # data collection each September (full-year data verified the preceding
    # June) and the staff collection each March. A yearly cron is therefore
    # proportional to the source; anything faster would re-download identical
    # workbooks. Runs 9 October, well after the September release settles.
    - cron: '23 19 9 10 *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['pipeline/**']

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # The pipeline is deliberately dependency-free (its own minimal zip/xlsx
      # reader), so there is nothing to install here.
      - run: node pipeline/collect.mjs
      - run: node pipeline/aggregate.mjs
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "Update data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || (git pull --rebase && git push)
